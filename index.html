<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>AeroTycoon — Simulador de Aeropuerto</title>

  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- iOS Standalone / Pantalla completa -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="AeroTycoon">
  <link rel="apple-touch-icon" href="icons/icon-180x180.png">
  <link rel="apple-touch-icon" sizes="152x152" href="icons/icon-192x192.png">
  <link rel="apple-touch-icon" sizes="167x167" href="icons/icon-192x192.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180x180.png">

  <!-- Android Theme Color -->
  <meta name="theme-color" content="#29B6F6">
  <meta name="msapplication-TileColor" content="#29B6F6">

  <style>
    :root {
      --bg-primary:    #0b0f19;
      --bg-surface:    #172033;
      --bg-elevated:   #1a1f35;
      --bg-hover:      #1e253d;
      --border-color:  #2a334a;
      --accent:        #29b6f6;
      --accent-hover:  #039be5;
      --text-primary:  #f1f5f9;
      --text-secondary:#94a3b8;
      --text-muted:    #64748b;
      --money:         #10b981;
      --day:           #f59e0b;
      --danger:        #ef4444;
    }

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      display: flex;
      justify-content: center;
    }

    #app {
      position: relative;
      width: 100%;
      max-width: 480px;
      min-height: 100dvh;
      min-height: 100vh;
      overflow: hidden;
    }

    /* ===== SCREENS ===== */
    .screen {
      position: absolute;
      inset: 0;
      transition: opacity 0.4s ease, transform 0.4s ease;
      -webkit-transition: opacity 0.4s ease, transform 0.4s ease;
    }
    #screen-creation {
      z-index: 2;
      background: var(--bg-primary);
    }
    #screen-game {
      z-index: 1;
      background: var(--bg-primary);
      overflow: hidden;
    }
    .screen.hidden {
      opacity: 0;
      pointer-events: none;
    }
    #screen-creation.hidden {
      transform: translateY(-16px) scale(0.98);
    }
    #screen-game.hidden {
      transform: translateY(16px) scale(0.98);
    }
    #screen-menu {
      z-index: 3;
      background: var(--bg-primary);
    }
    #screen-menu.hidden {
      transform: translateY(-16px) scale(0.98);
    }

    /* ============================================================
       SCREEN: CREATION
       ============================================================ */
    .creation-content {
      height: 100dvh;
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 32px 24px 28px;
      overflow: hidden;
    }
    .creation-fixed-top {
      flex-shrink: 0;
    }
    .cargo-scrollable {
      flex: 1;
      overflow-y: auto;
      min-height: 0;
    }
    .cargo-scrollable::-webkit-scrollbar {
      width: 4px;
    }
    .cargo-scrollable::-webkit-scrollbar-thumb {
      background: var(--border-color);
      border-radius: 10px;
    }

    .brand-header {
      text-align: center;
      margin-bottom: 36px;
    }
    .brand-header h1 {
      font-size: 30px;
      font-weight: 800;
      color: var(--text-primary);
      letter-spacing: -0.5px;
    }
    .brand-header p {
      color: var(--text-secondary);
      font-size: 14px;
      margin-top: 4px;
    }

    .form-group {
      margin-bottom: 22px;
    }
    .form-group > label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .input-field {
      width: 100%;
      padding: 16px 18px;
      background: var(--bg-elevated);
      border: 1.5px solid var(--border-color);
      border-radius: 14px;
      color: var(--text-primary);
      font-size: 16px;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-field:focus {
      border-color: var(--accent);
    }
    .input-field::placeholder {
      color: var(--text-muted);
    }

    .file-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
      padding: 16px 18px;
      background: var(--bg-elevated);
      border: 1.5px dashed var(--border-color);
      border-radius: 14px;
      color: var(--text-secondary);
      font-size: 15px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      min-height: 56px;
    }
    .file-btn:active {
      background: var(--bg-hover);
    }
    .file-btn.has-file {
      border-style: solid;
      border-color: var(--accent);
    }
    .file-btn .file-icon {
      font-size: 20px;
      flex-shrink: 0;
      color: var(--text-muted);
    }
    .file-btn .file-meta {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .file-btn .file-meta .file-label-text {
      font-size: 14px;
      color: var(--text-secondary);
    }
    .file-btn.has-file .file-meta .file-label-text {
      color: var(--text-primary);
      font-weight: 600;
    }
    .file-btn .file-meta .file-name {
      font-size: 12px;
      color: var(--text-muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      margin-top: 2px;
    }
    .file-btn .file-preview {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      overflow: hidden;
      background: var(--bg-hover);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .file-btn .file-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .file-btn .file-preview .preview-placeholder {
      font-size: 20px;
      color: var(--text-muted);
    }

    .cargo-grid {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .cargo-card {
      position: relative;
    }
    .cargo-card input[type="radio"] {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }
    .cargo-card label {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      background: var(--bg-elevated);
      border: 1.5px solid var(--border-color);
      border-radius: 14px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
      min-height: 56px;
    }
    .cargo-card label:active {
      background: var(--bg-hover);
    }
    .cargo-card input[type="radio"]:checked + label {
      border-color: var(--accent);
      background: #0d1a2e;
      box-shadow: 0 0 0 3px rgba(41, 182, 246, 0.12);
    }
    .cargo-card .cargo-icon {
      font-size: 22px;
      flex-shrink: 0;
      color: var(--text-secondary);
    }
    .cargo-card input[type="radio"]:checked + label .cargo-icon {
      color: var(--accent);
    }
    .cargo-card .cargo-info {
      flex: 1;
    }
    .cargo-card .cargo-info .cargo-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
    }
    .cargo-card .cargo-info .cargo-salary {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 2px;
    }
    .cargo-card .cargo-check {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
      color: transparent;
      font-size: 11px;
    }
    .cargo-card input[type="radio"]:checked + label .cargo-check {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .spacer {
      flex: 1;
    }

    .btn-primary {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      min-height: 56px;
      padding: 14px 20px;
      background: var(--accent);
      border: none;
      border-radius: 14px;
      color: #fff;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.2s, background 0.2s;
      margin-top: 8px;
      letter-spacing: 0.3px;
    }
    .btn-primary:active {
      transform: scale(0.97);
      background: var(--accent-hover);
      box-shadow: 0 4px 24px rgba(41, 182, 246, 0.25);
    }

    /* ============================================================
       SCREEN: GAME
       ============================================================ */
    .game-layout {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      height: 100vh;
    }

    .game-header {
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border-color);
      padding: 12px 16px;
      padding-top: max(12px, env(safe-area-inset-top));
      flex-shrink: 0;
    }
    .header-top {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }
    .logo-circle {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      overflow: hidden;
      background: var(--bg-elevated);
      border: 2px solid var(--border-color);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo-circle img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .logo-circle .default-icon {
      font-size: 20px;
      color: var(--text-muted);
    }
    .airline-name {
      font-size: 18px;
      font-weight: 700;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }

    .header-stats {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .header-stats .stat {
      flex: 1;
      text-align: center;
    }
    .header-stats .stat:first-child {
      text-align: left;
    }
    .header-stats .stat:last-child {
      text-align: right;
    }
    .header-stats .stat-value {
      font-size: 15px;
      font-weight: 700;
    }
    .header-stats .stat-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-secondary);
      margin-top: 1px;
    }
    .header-stats .stat-value.money {
      color: var(--money);
    }
    .header-stats .stat-value.day {
      color: var(--day);
    }
    .header-stats .stat-value.cargo {
      font-size: 13px;
      color: var(--text-secondary);
    }

    .console-area {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      -webkit-overflow-scrolling: touch;
    }
    .console-area::-webkit-scrollbar {
      width: 4px;
    }
    .console-area::-webkit-scrollbar-thumb {
      background: var(--border-color);
      border-radius: 10px;
    }

    .console-placeholder {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 14px;
      text-align: center;
      gap: 12px;
    }
    .console-placeholder .ph-icon {
      font-size: 32px;
      opacity: 0.4;
    }

    .bubble {
      padding: 12px 16px;
      background: var(--bg-surface);
      border-radius: 14px;
      border-left: 4px solid var(--border-color);
      font-size: 14px;
      line-height: 1.55;
      color: var(--text-primary);
      animation: bubble-in 0.3s ease;
      word-wrap: break-word;
    }
    .bubble .bubble-time {
      font-size: 10px;
      color: var(--text-muted);
      font-weight: 600;
      display: block;
      margin-bottom: 4px;
    }
    .bubble .bubble-icon {
      margin-right: 6px;
      color: var(--text-muted);
    }
    .bubble.salary {
      border-left-color: var(--money);
      background: #0a1f1a;
    }
    .bubble.salary .bubble-time {
      color: var(--money);
    }
    .bubble.salary .bubble-icon {
      color: var(--money);
    }
    .bubble.milestone {
      border-left-color: var(--day);
      background: #1e1a10;
    }
    .bubble.milestone .bubble-time {
      color: var(--day);
    }
    .bubble.milestone .bubble-icon {
      color: var(--day);
    }

    @keyframes bubble-in {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .bottom-bar {
      padding: 12px 16px;
      padding-bottom: max(12px, env(safe-area-inset-bottom));
      background: var(--bg-primary);
      border-top: 1px solid var(--border-color);
      flex-shrink: 0;
    }
    .btn-work {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      min-height: 56px;
      padding: 14px 20px;
      background: var(--accent);
      border: none;
      border-radius: 14px;
      color: #fff;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.2s, background 0.2s;
      letter-spacing: 0.3px;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-work:active {
      transform: scale(0.97);
      background: var(--accent-hover);
      box-shadow: 0 4px 24px rgba(41, 182, 246, 0.3);
    }

    /* ===== MENU SCREEN ===== */
    .menu-content {
      height: 100dvh;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 28px;
      gap: 48px;
    }
    .menu-brand {
      text-align: center;
    }
    .menu-brand .menu-logo-icon {
      font-size: 52px;
      margin-bottom: 16px;
      color: var(--accent);
    }
    .menu-brand h1 {
      font-size: 34px;
      font-weight: 800;
      color: var(--text-primary);
      letter-spacing: -0.5px;
    }
    .menu-brand p {
      color: var(--text-secondary);
      font-size: 14px;
      margin-top: 4px;
    }
    .menu-buttons {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .btn-menu {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      min-height: 56px;
      padding: 14px 20px;
      border: none;
      border-radius: 14px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.2s, opacity 0.2s, background 0.2s;
      letter-spacing: 0.3px;
    }
    .btn-menu:active:not(:disabled) {
      transform: scale(0.97);
    }
    .btn-menu:disabled {
      opacity: 0.3;
      cursor: not-allowed;
      transform: none;
    }
    .btn-menu.new-game {
      background: var(--accent);
      color: #fff;
    }
    .btn-menu.new-game:active:not(:disabled) {
      background: var(--accent-hover);
      box-shadow: 0 4px 24px rgba(41, 182, 246, 0.25);
    }
    .btn-menu.load-game {
      background: transparent;
      color: var(--accent);
      border: 1.5px solid var(--accent);
    }
    .btn-menu.load-game:active:not(:disabled) {
      background: rgba(41, 182, 246, 0.08);
    }
    .menu-footer {
      color: var(--text-muted);
      font-size: 13px;
      text-align: center;
      margin-top: -24px;
    }

    /* ===== SAVE BUTTON ===== */
    .btn-save {
      width: 44px;
      height: 44px;
      flex-shrink: 0;
      background: transparent;
      border: 1.5px solid var(--border-color);
      border-radius: 12px;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
      -webkit-tap-highlight-color: transparent;
      color: var(--text-muted);
    }
    .btn-save:active {
      background: var(--bg-hover);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ===== UTILITY ===== */
    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>

<div id="app">

  <!-- ============ SCREEN: MENU ============ -->
  <div id="screen-menu" class="screen">
    <div class="menu-content">
      <div class="menu-brand">
        <div class="menu-logo-icon"><i class="fas fa-plane"></i></div>
        <h1>AeroTycoon</h1>
        <p>Simulador de Gestión Aeroportuaria</p>
      </div>
      <div class="menu-buttons">
        <button class="btn-menu new-game" id="btn-new-game"><i class="fas fa-play"></i>  Nueva Partida</button>
        <button class="btn-menu load-game" id="btn-load-game" disabled><i class="fas fa-folder-open"></i>  Cargar Partida</button>
      </div>
      <p class="menu-footer">Selecciona una opción para comenzar</p>
    </div>
  </div>

  <!-- ============ SCREEN: CREATION ============ -->
  <div id="screen-creation" class="screen">
    <div class="creation-content">
      <div class="creation-fixed-top">
        <div class="brand-header">
          <h1>AeroTycoon</h1>
          <p>Simulador de Gestión Aeroportuaria</p>
        </div>

        <div class="form-group">
          <label for="airline-name">Nombre de la Aerolínea</label>
          <input type="text" class="input-field" id="airline-name" placeholder="Ej: SkyWings Airlines" maxlength="40" autocomplete="off">
        </div>

        <div class="form-group">
          <label>Logo de la Aerolínea</label>
          <label class="file-btn" id="file-btn">
            <i class="fas fa-image file-icon"></i>
            <span class="file-meta">
              <span class="file-label-text">Subir logo desde galería</span>
              <span class="file-name" id="file-name"></span>
            </span>
            <span class="file-preview" id="file-preview">
              <i class="fas fa-building preview-placeholder"></i>
            </span>
            <input type="file" id="logo-input" accept="image/png,image/jpeg,image/jpg" hidden>
          </label>
        </div>
      </div>

      <div class="cargo-scrollable">
        <div class="form-group">
          <label>Cargo Inicial</label>
          <div class="cargo-grid">
            <div class="cargo-card">
              <input type="radio" name="cargo" id="cargo-azafato" value="azafato" checked>
              <label for="cargo-azafato">
                <i class="fas fa-user-tie cargo-icon"></i>
                <span class="cargo-info">
                  <span class="cargo-name">Azafato/a de Vuelo</span>
                  <span class="cargo-salary">$1,200 / mes</span>
                </span>
                <span class="cargo-check"><i class="fas fa-check"></i></span>
              </label>
            </div>
            <div class="cargo-card">
              <input type="radio" name="cargo" id="cargo-gestor" value="gestor">
              <label for="cargo-gestor">
                <i class="fas fa-tower-broadcast cargo-icon"></i>
                <span class="cargo-info">
                  <span class="cargo-name">Gestor de Tráfico Aéreo</span>
                  <span class="cargo-salary">$1,800 / mes</span>
                </span>
                <span class="cargo-check"><i class="fas fa-check"></i></span>
              </label>
            </div>
            <div class="cargo-card">
              <input type="radio" name="cargo" id="cargo-agente" value="agente">
              <label for="cargo-agente">
                <i class="fas fa-shield-halved cargo-icon"></i>
                <span class="cargo-info">
                  <span class="cargo-name">Agente de Seguridad</span>
                  <span class="cargo-salary">$1,400 / mes</span>
                </span>
                <span class="cargo-check"><i class="fas fa-check"></i></span>
              </label>
            </div>
          </div>
        </div>
      </div>

      <div class="spacer"></div>
      <button class="btn-primary" id="btn-start"><i class="fas fa-arrow-right-to-bracket"></i>  Comenzar Jornada</button>
    </div>
  </div>

  <!-- ============ SCREEN: GAME ============ -->
  <div id="screen-game" class="screen hidden">
    <div class="game-layout">

      <!-- Header -->
      <header class="game-header">
        <div class="header-top">
          <div class="logo-circle" id="game-logo-wrap">
            <i class="fas fa-building default-icon" id="game-logo-fallback"></i>
            <img id="game-logo-img" src="" alt="Logo" style="display:none;">
          </div>
          <span class="airline-name" id="game-airline-name">—</span>
          <button class="btn-save" id="btn-save" title="Guardar partida"><i class="fas fa-floppy-disk"></i></button>
        </div>
        <div class="header-stats">
          <div class="stat">
            <div class="stat-value cargo" id="game-cargo">—</div>
            <div class="stat-label">Cargo</div>
          </div>
          <div class="stat">
            <div class="stat-value money" id="game-money">$0</div>
            <div class="stat-label">Dinero</div>
          </div>
          <div class="stat">
            <div class="stat-value day" id="game-day">Día 1</div>
            <div class="stat-label">del Mes</div>
          </div>
        </div>
      </header>

      <!-- Console -->
      <div class="console-area" id="console-area">
        <div class="console-placeholder" id="console-placeholder">
          <i class="fas fa-newspaper ph-icon"></i>
          <span>Aún no hay actividad.<br>¡Pulsa "Trabajar" para empezar!</span>
        </div>
      </div>

      <!-- Bottom Bar -->
      <div class="bottom-bar">
        <button class="btn-work" id="btn-work"><i class="fas fa-forward-step"></i>  Trabajar / Avanzar Día</button>
      </div>

    </div>
  </div>

</div>

<script>
  (function () {
    'use strict';

    /* ============================================================
       STATE
       ============================================================ */
    const CARGO_MAP = {
      azafato: { label: 'Azafato/a de Vuelo', salary: 1200 },
      gestor:  { label: 'Gestor de Tráfico Aéreo', salary: 1800 },
      agente:  { label: 'Agente de Seguridad', salary: 1400 }
    };

    const state = {
      airlineName: '',
      logoUrl: '',
      cargo: 'azafato',
      cargoLabel: 'Azafato/a de Vuelo',
      salary: 1200,
      money: 0,
      day: 1
    };

    /* ============================================================
       DOM REFS
       ============================================================ */
    const $ = id => document.getElementById(id);

    const screenMenu     = $('screen-menu');
    const screenCreation = $('screen-creation');
    const screenGame     = $('screen-game');

    const btnNewGame     = $('btn-new-game');
    const btnLoadGame    = $('btn-load-game');
    const btnSave        = $('btn-save');

    const airlineInput   = $('airline-name');
    const logoInput      = $('logo-input');
    const fileBtn        = $('file-btn');
    const fileName       = $('file-name');
    const filePreview    = $('file-preview');
    const cargoRadios    = document.querySelectorAll('input[name="cargo"]');
    const btnStart       = $('btn-start');

    const gameLogoImg      = $('game-logo-img');
    const gameLogoFallback = $('game-logo-fallback');
    const gameAirlineName  = $('game-airline-name');
    const gameCargo        = $('game-cargo');
    const gameMoney        = $('game-money');
    const gameDay          = $('game-day');
    const consoleArea      = $('console-area');
    const consolePlaceholder = $('console-placeholder');
    const btnWork          = $('btn-work');

    /* ============================================================
       HELPERS
       ============================================================ */
    function formatMoney(amount) {
      return '$' + amount.toLocaleString('en-US');
    }

    function vibrate(ms) {
      if (navigator.vibrate) {
        navigator.vibrate(ms);
      }
    }

    function showScreen(screen) {
      screenMenu.classList.add('hidden');
      screenCreation.classList.add('hidden');
      screenGame.classList.add('hidden');
      if (screen === 'menu') screenMenu.classList.remove('hidden');
      else if (screen === 'creation') screenCreation.classList.remove('hidden');
      else if (screen === 'game') screenGame.classList.remove('hidden');
    }

    function getTimestamp() {
      const d = new Date();
      return String(d.getHours()).padStart(2, '0') + ':' +
             String(d.getMinutes()).padStart(2, '0') + ':' +
             String(d.getSeconds()).padStart(2, '0');
    }

    function addBubble(message, type) {
      const bubble = document.createElement('div');
      bubble.className = 'bubble' + (type ? ' ' + type : '');
      bubble.innerHTML = '<span class="bubble-time">' + getTimestamp() + '</span>' + message;

      if (!consolePlaceholder.classList.contains('hidden')) {
        consolePlaceholder.classList.add('hidden');
      }

      consoleArea.appendChild(bubble);
      consoleArea.scrollTop = consoleArea.scrollHeight;
    }

    function updateUI() {
      gameAirlineName.textContent = state.airlineName;
      gameCargo.textContent = state.cargoLabel;
      gameMoney.textContent = formatMoney(state.money);
      gameDay.textContent = 'Día ' + state.day;

      if (state.logoUrl) {
        gameLogoImg.src = state.logoUrl;
        gameLogoImg.style.display = 'block';
        gameLogoFallback.style.display = 'none';
      } else {
        gameLogoImg.style.display = 'none';
        gameLogoFallback.style.display = 'inline';
      }
    }

    /* ============================================================
       SAVE / LOAD
       ============================================================ */
    const STORAGE_KEY = 'aerotycoon_save';

    function saveGame() {
      const bubbles = consoleArea.querySelectorAll('.bubble');
      const messages = Array.from(bubbles).map(function (b) {
        return b.outerHTML;
      });

      var data = {
        airlineName: state.airlineName,
        logoUrl: state.logoUrl,
        cargo: state.cargo,
        cargoLabel: state.cargoLabel,
        salary: state.salary,
        money: state.money,
        day: state.day,
        messages: messages
      };

      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        return true;
      } catch (e) {
        return false;
      }
    }

    function loadGame() {
      try {
        var raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : null;
      } catch (e) {
        return null;
      }
    }

    function hasSave() {
      return localStorage.getItem(STORAGE_KEY) !== null;
    }

    /* ============================================================
       MENU — NAVIGATION
       ============================================================ */
    btnNewGame.addEventListener('click', function () {
      showScreen('creation');
    });

    btnLoadGame.addEventListener('click', function () {
      var data = loadGame();
      if (!data) return;

      state.airlineName = data.airlineName;
      state.logoUrl = data.logoUrl || '';
      state.cargo = data.cargo;
      state.cargoLabel = data.cargoLabel;
      state.salary = data.salary;
      state.money = data.money;
      state.day = data.day;

      showScreen('game');
      updateUI();

      consoleArea.innerHTML = '';
      if (data.messages && data.messages.length > 0) {
        for (var i = 0; i < data.messages.length; i++) {
          var wrapper = document.createElement('div');
          wrapper.innerHTML = data.messages[i];
          consoleArea.appendChild(wrapper.firstElementChild);
        }
        consolePlaceholder.classList.add('hidden');
      } else {
        consolePlaceholder.classList.remove('hidden');
      }
    });

    /* ============================================================
       CREATION — FILE INPUT
       ============================================================ */
    logoInput.addEventListener('change', function () {
      const file = this.files && this.files[0];
      if (!file) return;

      fileName.textContent = file.name;
      fileBtn.classList.add('has-file');

      const reader = new FileReader();
      reader.onload = function (e) {
        const img = document.createElement('img');
        img.src = e.target.result;
        img.alt = 'Logo preview';
        filePreview.innerHTML = '';
        filePreview.appendChild(img);

        // Store for later use on start
        filePreview.dataset.logoUrl = e.target.result;
      };
      reader.readAsDataURL(file);
    });

    /* ============================================================
       CREATION — START GAME
       ============================================================ */
    btnStart.addEventListener('click', function () {
      const name = airlineInput.value.trim();
      if (!name) {
        airlineInput.style.borderColor = '#ef4444';
        airlineInput.focus();
        setTimeout(function () {
          airlineInput.style.borderColor = '';
        }, 2000);
        return;
      }

      // Get selected cargo
      let selectedCargo = 'azafato';
      for (var i = 0; i < cargoRadios.length; i++) {
        if (cargoRadios[i].checked) {
          selectedCargo = cargoRadios[i].value;
          break;
        }
      }

      const cargoData = CARGO_MAP[selectedCargo];
      state.airlineName = name;
      state.cargo = selectedCargo;
      state.cargoLabel = cargoData.label;
      state.salary = cargoData.salary;
      state.money = 0;
      state.day = 1;

      // Logo
      const logoUrl = filePreview.dataset.logoUrl || '';
      state.logoUrl = logoUrl;

      // Switch screen
      showScreen('game');
      updateUI();

      // Reset placeholder if needed
      consolePlaceholder.classList.remove('hidden');

      addBubble(
        '<i class="fas fa-plane bubble-icon"></i> Jornada iniciada como <strong>' + state.cargoLabel + '</strong> en <strong>' + state.airlineName + '</strong>'
      );
      addBubble('<i class="fas fa-calendar-day bubble-icon"></i> Hoy es el Día 1 del mes. ¡A trabajar!');

      saveGame();
    });

    /* ============================================================
       GAME — SAVE BUTTON
       ============================================================ */
    btnSave.addEventListener('click', function () {
      vibrate(20);
      saveGame();
      addBubble('<i class="fas fa-floppy-disk bubble-icon"></i> Partida guardada correctamente.');
    });

    /* ============================================================
       GAME — WORK / ADVANCE DAY
       ============================================================ */
    btnWork.addEventListener('click', function () {
      vibrate(20);

      state.day += 1;

      if (state.day >= 30) {
        state.money += state.salary;

        addBubble(
          '<i class="fas fa-coins bubble-icon"></i> ¡Fin de mes! Has cobrado tu sueldo de <strong>' + state.cargoLabel + '</strong> ' +
          '(' + formatMoney(state.salary) + '). Balance: <strong>' + formatMoney(state.money) + '</strong>',
          'salary'
        );
        addBubble('<i class="fas fa-calendar bubble-icon"></i> Nuevo mes comienza. ¡A seguir trabajando!', 'milestone');

        state.day = 1;
        updateUI();
        return;
      }

      addBubble('<i class="fas fa-check-circle bubble-icon"></i> Día ' + state.day + ' finalizado con éxito.');

      if (state.day === 15) {
        addBubble('<i class="fas fa-hourglass-half bubble-icon"></i> Mitad de mes. El sueldo se cobra al llegar al día 29.', 'milestone');
      }

      updateUI();
      saveGame();
    });

    /* ============================================================
       INIT
       ============================================================ */
    showScreen('menu');
    if (hasSave()) {
      btnLoadGame.disabled = false;
    }
  })();
</script>

</body>
</html>
