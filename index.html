<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>AeroTycoon — Simulador de Aeropuerto</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- iOS Standalone / Pantalla completa -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="AeroTycoon">
  <link rel="apple-touch-icon" href="icons/icon-180x180.png">
  <link rel="apple-touch-icon" sizes="152x152" href="icons/icon-192x192.png">
  <link rel="apple-touch-icon" sizes="167x167" href="icons/icon-192x192.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180x180.png">

  <!-- Android Theme Color -->
  <meta name="theme-color" content="#29B6F6">
  <meta name="msapplication-TileColor" content="#29B6F6">

  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #0d111c;
      color: #e2e8f0;
      display: flex;
      justify-content: center;
    }

    #app {
      position: relative;
      width: 100%;
      max-width: 480px;
      min-height: 100dvh;
      min-height: 100vh;
      overflow: hidden;
    }

    /* ===== SCREENS ===== */
    .screen {
      position: absolute;
      inset: 0;
      transition: opacity 0.4s ease, transform 0.4s ease;
      -webkit-transition: opacity 0.4s ease, transform 0.4s ease;
    }
    #screen-creation {
      z-index: 2;
      background: #0d111c;
      overflow-y: auto;
    }
    #screen-game {
      z-index: 1;
      background: #0d111c;
    }
    .screen.hidden {
      opacity: 0;
      pointer-events: none;
    }
    #screen-creation.hidden {
      transform: translateY(-16px) scale(0.98);
    }
    #screen-game.hidden {
      transform: translateY(16px) scale(0.98);
    }

    /* ============================================================
       SCREEN: CREATION
       ============================================================ */
    .creation-content {
      min-height: 100dvh;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 32px 24px 28px;
    }

    .brand-header {
      text-align: center;
      margin-bottom: 36px;
    }
    .brand-header h1 {
      font-size: 30px;
      font-weight: 800;
      background: linear-gradient(135deg, #5b8def, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }
    .brand-header p {
      color: #7f8bb3;
      font-size: 14px;
      margin-top: 4px;
    }

    .form-group {
      margin-bottom: 22px;
    }
    .form-group > label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #7f8bb3;
      margin-bottom: 8px;
    }

    /* Input nombre */
    .input-field {
      width: 100%;
      padding: 16px 18px;
      background: #10162a;
      border: 1.5px solid #252d44;
      border-radius: 16px;
      color: #e2e8f0;
      font-size: 16px;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-field:focus {
      border-color: #5b8def;
    }
    .input-field::placeholder {
      color: #4a5578;
    }

    /* File upload — botón grande */
    .file-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
      padding: 16px 18px;
      background: #10162a;
      border: 1.5px dashed #252d44;
      border-radius: 16px;
      color: #7f8bb3;
      font-size: 15px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      min-height: 56px;
    }
    .file-btn:active {
      background: #1a2238;
    }
    .file-btn.has-file {
      border-style: solid;
      border-color: #5b8def;
    }
    .file-btn .icon {
      font-size: 24px;
      flex-shrink: 0;
    }
    .file-btn .file-meta {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .file-btn .file-meta .file-label-text {
      font-size: 14px;
      color: #7f8bb3;
    }
    .file-btn.has-file .file-meta .file-label-text {
      color: #e2e8f0;
      font-weight: 600;
    }
    .file-btn .file-meta .file-name {
      font-size: 12px;
      color: #4a5578;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      margin-top: 2px;
    }
    .file-btn .file-preview {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      overflow: hidden;
      background: #1a2238;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .file-btn .file-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .file-btn .file-preview .preview-placeholder {
      font-size: 20px;
      color: #4a5578;
    }

    /* Cargo — radio cards */
    .cargo-grid {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .cargo-card {
      position: relative;
    }
    .cargo-card input[type="radio"] {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }
    .cargo-card label {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      background: #10162a;
      border: 1.5px solid #252d44;
      border-radius: 16px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
      min-height: 56px;
    }
    .cargo-card label:active {
      background: #1a2238;
    }
    .cargo-card input[type="radio"]:checked + label {
      border-color: #5b8def;
      background: #141e38;
      box-shadow: 0 0 0 3px rgba(91, 141, 239, 0.15);
    }
    .cargo-card .cargo-icon {
      font-size: 26px;
      flex-shrink: 0;
    }
    .cargo-card .cargo-info {
      flex: 1;
    }
    .cargo-card .cargo-info .cargo-name {
      font-size: 15px;
      font-weight: 600;
      color: #e2e8f0;
    }
    .cargo-card .cargo-info .cargo-salary {
      font-size: 13px;
      color: #7f8bb3;
      margin-top: 2px;
    }
    .cargo-card .cargo-check {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid #252d44;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
      font-size: 12px;
      color: transparent;
    }
    .cargo-card input[type="radio"]:checked + label .cargo-check {
      background: #5b8def;
      border-color: #5b8def;
      color: #fff;
    }

    .spacer {
      flex: 1;
    }

    .btn-primary {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      min-height: 56px;
      padding: 14px 20px;
      background: linear-gradient(135deg, #5b8def, #a78bfa);
      border: none;
      border-radius: 16px;
      color: #fff;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.2s;
      margin-top: 8px;
      letter-spacing: 0.3px;
    }
    .btn-primary:active {
      transform: scale(0.97);
      box-shadow: 0 4px 20px rgba(91, 141, 239, 0.25);
    }

    /* ============================================================
       SCREEN: GAME
       ============================================================ */
    .game-layout {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      height: 100vh;
    }

    /* Header */
    .game-header {
      background: #161d31;
      border-bottom: 1px solid #252d44;
      padding: 12px 16px;
      padding-top: max(12px, env(safe-area-inset-top));
      flex-shrink: 0;
    }
    .header-top {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }
    .logo-circle {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      overflow: hidden;
      background: #10162a;
      border: 2px solid #252d44;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo-circle img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .logo-circle .default-icon {
      font-size: 22px;
      color: #4a5578;
    }
    .airline-name {
      font-size: 18px;
      font-weight: 700;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }

    .header-stats {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .header-stats .stat {
      flex: 1;
      text-align: center;
    }
    .header-stats .stat:first-child {
      text-align: left;
    }
    .header-stats .stat:last-child {
      text-align: right;
    }
    .header-stats .stat-value {
      font-size: 15px;
      font-weight: 700;
    }
    .header-stats .stat-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #7f8bb3;
      margin-top: 1px;
    }
    .header-stats .stat-value.money {
      color: #34d399;
    }
    .header-stats .stat-value.day {
      color: #fbbf24;
    }
    .header-stats .stat-value.cargo {
      font-size: 13px;
      color: #94a3b8;
    }

    /* Console */
    .console-area {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      -webkit-overflow-scrolling: touch;
    }
    .console-area::-webkit-scrollbar {
      width: 4px;
    }
    .console-area::-webkit-scrollbar-thumb {
      background: #252d44;
      border-radius: 10px;
    }

    .console-placeholder {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #3a4560;
      font-size: 14px;
      text-align: center;
      gap: 8px;
    }
    .console-placeholder .ph-icon {
      font-size: 36px;
      opacity: 0.5;
    }

    .bubble {
      padding: 12px 16px;
      background: #161d31;
      border-radius: 16px;
      border-left: 4px solid #252d44;
      font-size: 14px;
      line-height: 1.55;
      color: #c8d0e0;
      animation: bubble-in 0.3s ease;
      word-wrap: break-word;
    }
    .bubble .bubble-time {
      font-size: 10px;
      color: #4a5578;
      font-weight: 600;
      display: block;
      margin-bottom: 4px;
    }
    .bubble.salary {
      border-left-color: #34d399;
      background: #0e1f1e;
    }
    .bubble.salary .bubble-time {
      color: #34d399;
    }
    .bubble.milestone {
      border-left-color: #fbbf24;
      background: #1a1a1a;
    }
    .bubble.milestone .bubble-time {
      color: #fbbf24;
    }

    @keyframes bubble-in {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Bottom bar */
    .bottom-bar {
      padding: 12px 16px;
      padding-bottom: max(12px, env(safe-area-inset-bottom));
      background: #0d111c;
      border-top: 1px solid #1a2238;
      flex-shrink: 0;
    }
    .btn-work {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      min-height: 56px;
      padding: 14px 20px;
      background: linear-gradient(135deg, #f59e0b, #ea580c);
      border: none;
      border-radius: 16px;
      color: #fff;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.2s;
      letter-spacing: 0.3px;
      text-shadow: 0 1px 2px rgba(0,0,0,0.15);
      -webkit-tap-highlight-color: transparent;
    }
    .btn-work:active {
      transform: scale(0.97);
      box-shadow: 0 4px 25px rgba(245, 158, 11, 0.3);
    }

    /* ===== UTILITY ===== */
    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>

<div id="app">

  <!-- ============ SCREEN: CREATION ============ -->
  <div id="screen-creation" class="screen">
    <div class="creation-content">
      <div class="brand-header">
        <h1>AeroTycoon</h1>
        <p>Simulador de Gestión Aeroportuaria</p>
      </div>

      <div class="form-group">
        <label for="airline-name">Nombre de la Aerolínea</label>
        <input type="text" class="input-field" id="airline-name" placeholder="Ej: SkyWings Airlines" maxlength="40" autocomplete="off">
      </div>

      <div class="form-group">
        <label>Logo de la Aerolínea</label>
        <label class="file-btn" id="file-btn">
          <span class="icon">📷</span>
          <span class="file-meta">
            <span class="file-label-text">Subir logo desde galería</span>
            <span class="file-name" id="file-name"></span>
          </span>
          <span class="file-preview" id="file-preview">
            <span class="preview-placeholder">✈️</span>
          </span>
          <input type="file" id="logo-input" accept="image/png,image/jpeg,image/jpg" hidden>
        </label>
      </div>

      <div class="form-group">
        <label>Cargo Inicial</label>
        <div class="cargo-grid">
          <div class="cargo-card">
            <input type="radio" name="cargo" id="cargo-azafato" value="azafato" checked>
            <label for="cargo-azafato">
              <span class="cargo-icon">🛩️</span>
              <span class="cargo-info">
                <span class="cargo-name">Azafato/a de Vuelo</span>
                <span class="cargo-salary">$1,200 / mes</span>
              </span>
              <span class="cargo-check">✓</span>
            </label>
          </div>
          <div class="cargo-card">
            <input type="radio" name="cargo" id="cargo-gestor" value="gestor">
            <label for="cargo-gestor">
              <span class="cargo-icon">📡</span>
              <span class="cargo-info">
                <span class="cargo-name">Gestor de Tráfico Aéreo</span>
                <span class="cargo-salary">$1,800 / mes</span>
              </span>
              <span class="cargo-check">✓</span>
            </label>
          </div>
          <div class="cargo-card">
            <input type="radio" name="cargo" id="cargo-agente" value="agente">
            <label for="cargo-agente">
              <span class="cargo-icon">🛂</span>
              <span class="cargo-info">
                <span class="cargo-name">Agente de Seguridad</span>
                <span class="cargo-salary">$1,400 / mes</span>
              </span>
              <span class="cargo-check">✓</span>
            </label>
          </div>
        </div>
      </div>

      <div class="spacer"></div>
      <button class="btn-primary" id="btn-start">✈️  &nbsp;Comenzar Jornada</button>
    </div>
  </div>

  <!-- ============ SCREEN: GAME ============ -->
  <div id="screen-game" class="screen hidden">
    <div class="game-layout">

      <!-- Header -->
      <header class="game-header">
        <div class="header-top">
          <div class="logo-circle" id="game-logo-wrap">
            <span class="default-icon" id="game-logo-fallback">✈️</span>
            <img id="game-logo-img" src="" alt="Logo" style="display:none;">
          </div>
          <span class="airline-name" id="game-airline-name">—</span>
        </div>
        <div class="header-stats">
          <div class="stat">
            <div class="stat-value cargo" id="game-cargo">—</div>
            <div class="stat-label">Cargo</div>
          </div>
          <div class="stat">
            <div class="stat-value money" id="game-money">$0</div>
            <div class="stat-label">Dinero</div>
          </div>
          <div class="stat">
            <div class="stat-value day" id="game-day">Día 1</div>
            <div class="stat-label">del Mes</div>
          </div>
        </div>
      </header>

      <!-- Console -->
      <div class="console-area" id="console-area">
        <div class="console-placeholder" id="console-placeholder">
          <span class="ph-icon">📋</span>
          <span>Aún no hay actividad.<br>¡Pulsa "Trabajar" para empezar!</span>
        </div>
      </div>

      <!-- Bottom Bar -->
      <div class="bottom-bar">
        <button class="btn-work" id="btn-work">✈️  &nbsp;Trabajar / Avanzar Día</button>
      </div>

    </div>
  </div>

</div>

<script>
  (function () {
    'use strict';

    /* ============================================================
       STATE
       ============================================================ */
    const CARGO_MAP = {
      azafato: { label: 'Azafato/a de Vuelo', salary: 1200 },
      gestor:  { label: 'Gestor de Tráfico Aéreo', salary: 1800 },
      agente:  { label: 'Agente de Seguridad', salary: 1400 }
    };

    const state = {
      airlineName: '',
      logoUrl: '',
      cargo: 'azafato',
      cargoLabel: 'Azafato/a de Vuelo',
      salary: 1200,
      money: 0,
      day: 1
    };

    /* ============================================================
       DOM REFS
       ============================================================ */
    const $ = id => document.getElementById(id);

    const screenCreation = $('screen-creation');
    const screenGame     = $('screen-game');

    const airlineInput   = $('airline-name');
    const logoInput      = $('logo-input');
    const fileBtn        = $('file-btn');
    const fileName       = $('file-name');
    const filePreview    = $('file-preview');
    const cargoRadios    = document.querySelectorAll('input[name="cargo"]');
    const btnStart       = $('btn-start');

    const gameLogoImg      = $('game-logo-img');
    const gameLogoFallback = $('game-logo-fallback');
    const gameAirlineName  = $('game-airline-name');
    const gameCargo        = $('game-cargo');
    const gameMoney        = $('game-money');
    const gameDay          = $('game-day');
    const consoleArea      = $('console-area');
    const consolePlaceholder = $('console-placeholder');
    const btnWork          = $('btn-work');

    /* ============================================================
       HELPERS
       ============================================================ */
    function formatMoney(amount) {
      return '$' + amount.toLocaleString('en-US');
    }

    function vibrate(ms) {
      if (navigator.vibrate) {
        navigator.vibrate(ms);
      }
    }

    function showScreen(screen) {
      if (screen === 'game') {
        screenCreation.classList.add('hidden');
        screenGame.classList.remove('hidden');
      } else {
        screenGame.classList.add('hidden');
        screenCreation.classList.remove('hidden');
      }
    }

    function getTimestamp() {
      const d = new Date();
      return String(d.getHours()).padStart(2, '0') + ':' +
             String(d.getMinutes()).padStart(2, '0') + ':' +
             String(d.getSeconds()).padStart(2, '0');
    }

    function addBubble(message, type) {
      const bubble = document.createElement('div');
      bubble.className = 'bubble' + (type ? ' ' + type : '');
      bubble.innerHTML = '<span class="bubble-time">' + getTimestamp() + '</span>' + message;

      if (!consolePlaceholder.classList.contains('hidden')) {
        consolePlaceholder.classList.add('hidden');
      }

      consoleArea.appendChild(bubble);
      consoleArea.scrollTop = consoleArea.scrollHeight;
    }

    function updateUI() {
      gameAirlineName.textContent = state.airlineName;
      gameCargo.textContent = state.cargoLabel;
      gameMoney.textContent = formatMoney(state.money);
      gameDay.textContent = 'Día ' + state.day;

      if (state.logoUrl) {
        gameLogoImg.src = state.logoUrl;
        gameLogoImg.style.display = 'block';
        gameLogoFallback.style.display = 'none';
      } else {
        gameLogoImg.style.display = 'none';
        gameLogoFallback.style.display = 'inline';
      }
    }

    /* ============================================================
       CREATION — FILE INPUT
       ============================================================ */
    logoInput.addEventListener('change', function () {
      const file = this.files && this.files[0];
      if (!file) return;

      fileName.textContent = file.name;
      fileBtn.classList.add('has-file');

      const reader = new FileReader();
      reader.onload = function (e) {
        const img = document.createElement('img');
        img.src = e.target.result;
        img.alt = 'Logo preview';
        filePreview.innerHTML = '';
        filePreview.appendChild(img);

        // Store for later use on start
        filePreview.dataset.logoUrl = e.target.result;
      };
      reader.readAsDataURL(file);
    });

    /* ============================================================
       CREATION — START GAME
       ============================================================ */
    btnStart.addEventListener('click', function () {
      const name = airlineInput.value.trim();
      if (!name) {
        airlineInput.style.borderColor = '#ef4444';
        airlineInput.focus();
        setTimeout(function () {
          airlineInput.style.borderColor = '';
        }, 2000);
        return;
      }

      // Get selected cargo
      let selectedCargo = 'azafato';
      for (var i = 0; i < cargoRadios.length; i++) {
        if (cargoRadios[i].checked) {
          selectedCargo = cargoRadios[i].value;
          break;
        }
      }

      const cargoData = CARGO_MAP[selectedCargo];
      state.airlineName = name;
      state.cargo = selectedCargo;
      state.cargoLabel = cargoData.label;
      state.salary = cargoData.salary;
      state.money = 0;
      state.day = 1;

      // Logo
      const logoUrl = filePreview.dataset.logoUrl || '';
      state.logoUrl = logoUrl;

      // Switch screen
      showScreen('game');
      updateUI();

      // Reset placeholder if needed
      consolePlaceholder.classList.remove('hidden');

      addBubble(
        '✈️  Jornada iniciada como <strong>' + state.cargoLabel + '</strong> en <strong>' + state.airlineName + '</strong>'
      );
      addBubble('📅  Hoy es el Día 1 del mes. ¡A trabajar!');
    });

    /* ============================================================
       GAME — WORK / ADVANCE DAY
       ============================================================ */
    btnWork.addEventListener('click', function () {
      vibrate(20);

      state.day += 1;

      if (state.day >= 30) {
        state.money += state.salary;

        addBubble(
          '💰  ¡Fin de mes! Has cobrado tu sueldo de <strong>' + state.cargoLabel + '</strong> ' +
          '(' + formatMoney(state.salary) + '). Balance: <strong>' + formatMoney(state.money) + '</strong>',
          'salary'
        );
        addBubble('📆  Nuevo mes comienza. ¡A seguir trabajando!', 'milestone');

        state.day = 1;
        updateUI();
        return;
      }

      addBubble('📌  Día ' + state.day + ' finalizado con éxito.');

      if (state.day === 15) {
        addBubble('⏳  Mitad de mes. El sueldo se cobra al llegar al día 29.', 'milestone');
      }

      updateUI();
    });

    /* ============================================================
       INIT
       ============================================================ */
    showScreen('creation');
  })();
</script>

</body>
</html>
